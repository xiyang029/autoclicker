name: Release

on:
  push:
    branches:
      - main
    paths:
      - pubspec.yaml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version and check for changes
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 提取 pubspec.yaml 中的版本号
          current_version="$(grep -E '^version:' pubspec.yaml | awk '{print $2}')"
          version_name="${current_version%%+*}"
          version_code="${current_version##*+}"

          # 使用 GitHub CLI 获取最新发布版本
          # 如果没有发布过版本，latest_tag 将为空
          latest_tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')

          if [[ -n "${latest_tag}" && "${latest_tag}" == "${version_name}" ]]; then
            echo "Latest release already matches version: ${version_name}"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "current=${current_version}" >> "$GITHUB_OUTPUT"
            echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
            echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when version did not change
        if: steps.version.outputs.changed != 'true'
        run: echo "No release needed."

      - name: Verify release signing files
        if: steps.version.outputs.changed == 'true'
        run: |
          test -f android/key.properties
          test -f android/release.jks

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: flutter pub get

      - name: Build release APKs
        if: steps.version.outputs.changed == 'true'
        run: |
          flutter build apk \
          --release \
          --split-per-abi \
          --obfuscate \
          --split-debug-info=build/app/outputs/symbols \
          --no-tree-shake-icons

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_name }}
          name: autoclicker v${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/*.apk
          fail_on_unmatched_files: true
